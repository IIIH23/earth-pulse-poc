schema_version: "1.0"

project:
  id: pulse-of-earth
  repository: IIIH23/earth-pulse-poc
  default_branch: main

artifacts:
  public_feed:
    path: earth-pulse.json
    url: https://raw.githubusercontent.com/IIIH23/earth-pulse-poc/main/earth-pulse.json
    schema: docs/earth-pulse-json-contract.md

workflows:
  continuous_integration: .github/workflows/ci.yml
  feed_publication: .github/workflows/update-earth-pulse.yml

orchestrator:
  repository: IIIH23/ai-orchestrator
  profile: projects/pulse-of-earth.yaml
  runtime_dependency: false
  allowed_operations:
    - repository_read
    - workflow_read
    - workflow_dispatch
    - pull_request_create
    - issue_sync
    - status_notify
  owner_approval_required:
    - direct_push_to_main
    - production_environment_change
    - secret_change
    - dns_change
    - paid_resource_creation
