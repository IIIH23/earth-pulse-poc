name: Linear Sync

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  linear-sync:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Sync Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
        run: python3 tools/linear_sync.py --project-id "$LINEAR_PROJECT_ID"
