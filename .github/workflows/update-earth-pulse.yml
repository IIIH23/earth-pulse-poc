name: Update Earth Pulse JSON

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: earth-pulse-json
  cancel-in-progress: false

jobs:
  update:
    name: Detect 26s pulse
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate Earth Pulse JSON
        run: python generate_earth_pulse_json.py --hours 6 --output earth-pulse.json --verbose

      - name: Commit published JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add earth-pulse.json
          git diff --cached --quiet || git commit -m "Update Earth Pulse JSON"
          git push
