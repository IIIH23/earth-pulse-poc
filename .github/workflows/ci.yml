name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: pip install flake8 black isort mypy
      - name: Black format check
        run: black --check --diff .
      - name: isort import order
        run: isort --check-only --diff .
      - name: Flake8 lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements-dev.txt || pip install pytest paramiko
      - name: Run unit tests
        run: python -m pytest tests/test_inventory_pytest.py -v
      - name: Run smoke test
        run: bash tests/smoke_test.sh

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: GitHub Dependency Review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/pulse-of-earth:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/pulse-of-earth:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image with Cosign keyless
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/pulse-of-earth:sha-${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "1"
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom-spdx.json
      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-spdx.json

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: sign
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://earthbit.staging.terrabits.org
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/terrabits/apps/pulse-of-earth
            docker compose pull
            docker compose up -d
            docker compose ps
      - name: Health check
        run: |
          sleep 10
          curl -f https://earthbit.staging.terrabits.org/health || exit 1
# trigger CI
