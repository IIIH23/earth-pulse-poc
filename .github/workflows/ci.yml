name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile script
        run: python -m py_compile earth_period.py collect_earth_period.py earth_26s_detector.py collect_earth_26s.py generate_earth_pulse_json.py

      - name: Check CLI help
        run: |
          python earth_period.py --help
          python earth_26s_detector.py --help
          python collect_earth_26s.py --help
          python generate_earth_pulse_json.py --help

      - name: Run unit and contract tests
        run: python -m pytest -q
