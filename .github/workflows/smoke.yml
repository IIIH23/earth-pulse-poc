name: Smoke test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: chmod +x tests/smoke_test.sh
      - run: python3 tools/inventory.py > audit/FILE_INVENTORY.md
      - run: python3 tools/healthcheck.py --exit-zero --json
      - run: python3 tools/telegram_notify.py --dry-run --severity info --message "CI smoke test"
      - run: python3 tools/rollback.py --dry-run --state-dir /tmp/rollback-state
      - run: tests/smoke_test.sh
