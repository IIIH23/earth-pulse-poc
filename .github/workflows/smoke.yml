name: Smoke test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: chmod +x tests/smoke_test.sh
      - run: python3 tools/inventory.py > audit/FILE_INVENTORY.md
      - run: tests/smoke_test.sh
